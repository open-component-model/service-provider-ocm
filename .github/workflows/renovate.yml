name: Renovate
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - .github/renovate.json5
      - .github/workflows/renovate.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/renovate.json5
      - .github/workflows/renovate.yml

permissions:
  contents: read

env:
  RENOVATE_CONFIG_FILE: .github/renovate.json5

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            ${{ env.RENOVATE_CONFIG_FILE }}

      - if: ${{ github.event_name != 'pull_request' && github.repository_owner == 'open-component-model' }}
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.OCMBOT_APP_ID }}
          private-key: ${{ secrets.OCMBOT_PRIV_KEY }}

      - name: Ensure Dry-Run on Pull Requests
        if: ${{ github.event_name == 'pull_request' }}
        run: echo "RENOVATE_DRY_RUN=extract" >> $GITHUB_ENV

      - name: Run Renovate
        uses: renovatebot/github-action@b67590ea780158ccd13192c22a3655a5231f869d # v46.1.8
        with:
          token: ${{ steps.generate_token.outputs.token || secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_USERNAME: 'ocmbot[bot]'
          RENOVATE_PLATFORM: 'github'
          RENOVATE_PLATFORM_COMMIT: 'true'
          RENOVATE_REPOSITORIES: '${{ github.repository }}'
