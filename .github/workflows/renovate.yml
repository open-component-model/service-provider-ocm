name: Renovate
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RENOVATE_CONFIG_FILE: .github/renovate.json5

jobs:
  renovate:
    runs-on: ubuntu-latest
    environment:
      name: automation
      deployment: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            ${{ env.RENOVATE_CONFIG_FILE }}

      - if: ${{ github.event_name != 'pull_request' && github.repository_owner == 'open-component-model' }}
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.OCMBOT_APP_ID }}
          private-key: ${{ secrets.OCMBOT_PRIV_KEY }}

      - name: Ensure Dry-Run on Pull Requests
        if: ${{ github.event_name == 'pull_request' }}
        run: echo "RENOVATE_DRY_RUN=extract" >> $GITHUB_ENV

      - name: Run Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          token: ${{ steps.generate_token.outputs.token || secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_USERNAME: 'ocmbot[bot]'
          RENOVATE_PLATFORM: 'github'
          RENOVATE_PLATFORM_COMMIT: 'true'
          RENOVATE_REPOSITORIES: '${{ github.repository }}'
